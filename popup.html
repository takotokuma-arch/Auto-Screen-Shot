<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>Auto Screen Shot</title>
</head>
<body>
  <div class="container">
    <h2>Auto Screen Shot</h2>
    
    <div class="warning-box">
      <strong>⚠️ Important:</strong> Before starting, please ensure that Chrome's "Ask where to save each file before downloading" setting is turned <strong>OFF</strong>. Otherwise, you will be prompted for every screenshot.
    </div>

    <div class="config-section">
      <div class="input-group">
        <label for="pageCount">Number of Pages:</label>
        <input type="number" id="pageCount" min="1" value="10">
      </div>
      <div class="input-group">
        <label for="waitTimeMs">Wait Time (ms):</label>
        <input type="number" id="waitTimeMs" min="100" value="2000" step="100">
      </div>
      <div class="input-group">
        <label for="arrowDirection">Next Page Key:</label>
        <select id="arrowDirection">
          <option value="ArrowRight">Right Arrow (→)</option>
          <option value="ArrowLeft">Left Arrow (←)</option>
        </select>
      </div>
    </div>

    <div class="status-section">
      <div class="status-item">
        <span>Area:</span>
        <span id="areaStatus" class="status-badge unfixed">Not Set</span>
      </div>
    </div>

    <div class="button-group">
      <button id="btnAreaSelect" class="btn secondary">1. Select Area</button>
      <button id="btnStart" class="btn primary" disabled>2. Start Automation</button>
    </div>
    
  </div>
  <script src="popup.js"></script>
</body>
</html>
